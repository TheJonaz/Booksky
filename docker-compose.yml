services:
  postgres:
    image: postgres:16-alpine
    container_name: booksky-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: booksky
      POSTGRES_PASSWORD: booksky_dev
      POSTGRES_DB: booksky
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - booksky_pgdata:/var/lib/postgresql/data

volumes:
  booksky_pgdata:
